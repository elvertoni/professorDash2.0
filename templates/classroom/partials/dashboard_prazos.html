{% if prazos %}
    <div class="tbl-wrap">
        <table class="tbl">
            <thead>
                <tr>
                    <th scope="col">Atividade</th>
                    <th scope="col">Turma</th>
                    <th scope="col">Prazo</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for atividade in prazos %}
                    <tr>
                        <td><b class="text-strong">{{ atividade.titulo }}</b></td>
                        <td>{{ atividade.turma.nome }}</td>
                        <td class="mono">{{ atividade.prazo|date:'d/m/Y H:i' }}</td>
                        <td>
                            <a class="btn btn-outline btn-sm" href="{% url 'activities:atividade_entregas' atividade.pk %}">
                                <i data-lucide="list-checks" aria-hidden="true"></i> Entregas
                            </a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <div class="empty">
        <i data-lucide="calendar-check" aria-hidden="true"></i>
        <h2>Sem prazos próximos</h2>
        <p>Nenhuma atividade vence nos próximos 7 dias.</p>
    </div>
{% endif %}
