{% extends 'base.html' %}

{% block title %}Excluir material · Prof. Toni Coimbra{% endblock %}

{% block content %}
<section class="classroom-page narrow-page">
    <nav class="lesson-breadcrumb" aria-label="Caminho">
        <a href="{% url 'classroom:turma_list' %}">Turmas</a>
        <a href="{{ turma.get_absolute_url }}">{{ turma.nome }}</a>
        <a href="{% url 'materials:material_list' turma.pk %}">Materiais</a>
        <span>Excluir</span>
    </nav>

    <div class="panel danger-panel">
        <span class="badge badge-danger"><i data-lucide="alert-triangle"></i> Ação permanente</span>
        <h1>Excluir material?</h1>
        <p>Esta ação remove "{{ material.titulo }}" e o arquivo associado.</p>
        <form class="form-actions" method="post">
            {% csrf_token %}
            <a class="btn btn-outline" href="{% url 'materials:material_list' turma.pk %}">Cancelar</a>
            <button class="btn btn-danger" type="submit">
                <i data-lucide="trash-2"></i>
                Excluir material
            </button>
        </form>
    </div>
</section>
{% endblock %}
